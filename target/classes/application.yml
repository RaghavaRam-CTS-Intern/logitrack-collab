spring:
  application:
    name: logitrack
  datasource:
    url: jdbc:mysql://localhost:3306/logitrack_backend_db3?createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

server:
  port: 8085

jwt:
  secret: logitrack_jwt_secret_key_batch11_2026_very_long_secret
  expiration: 86400000

logging:
  level:
    com.cognizant.logitrack: DEBUG
